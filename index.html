<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Triciclos L&L - GPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
header{
background:red;
padding:10px;
text-align:center;
font-weight:bold;
position:relative;
z-index:10;
}

/* MAPA FULL SCREEN */
#map{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:1;
}

/* PANELES */
#loginBox,#adminPanel,#driverPanel{
display:none;
position:relative;
z-index:20;
padding:20px;
}

/* INPUTS */
input,select{
padding:10px;
margin:5px;
width:90%;
border-radius:6px;
border:none;
}

/* BOTONES FLOTANTES */
.fab{
position:fixed;
right:15px;
background:red;
color:white;
border:none;
padding:12px 14px;
border-radius:50px;
z-index:999;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
font-size:14px;
}

.fab1{bottom:20px;}
.fab2{bottom:80px;}
.fab3{bottom:140px;}
.fab4{bottom:200px;}
</style>
</head>

<body>

<header>
🚖 Triciclos L&L - Tu destino, nuestro compromiso
</header>

<!-- MAPA -->
<div id="map"></div>

<!-- LOGIN -->
<div id="loginBox">
<h2>Inicio de sesión</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<select id="role">
<option value="driver">Conductor</option>
<option value="admin">Administrador</option>
</select>

<button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h2>Admin</h2>
</div>

<!-- DRIVER -->
<div id="driverPanel">
<h2>Conductor</h2>
</div>

<!-- BOTONES FLOTANTES -->
<button class="fab fab1" onclick="startTracking()">▶ GPS</button>
<button class="fab fab2" onclick="stopTracking()">⛔ Parar</button>
<button class="fab fab3" onclick="logout()">🚪 Salir</button>

<script>

// ================= MAPA =================
let map = L.map('map').setView([32.5, -96.8], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Triciclos L&L'
}).addTo(map);

// ================= FIREBASE =================
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_PROJECT.firebaseapp.com",
databaseURL: "https://TU_PROJECT.firebaseio.com",
projectId: "TU_PROJECT",
storageBucket: "TU_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let watchId;
let markers = {};

// ================= LOGIN =================
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;
let r = document.getElementById("role").value;

// ADMIN LOCAL
if(r === "admin"){
if(u === "Leuris" && p === "uber981016"){
alert("Bienvenido Admin");
return;
}else{
alert("Error admin");
return;
}
}

// CONDUCTOR (FIREBASE)
auth.signInWithEmailAndPassword(u,p)
.then(()=>alert("Conductor conectado"))
.catch(e=>alert(e.message));
}

// ================= GPS =================
function startTracking(){

document.getElementById("map").style.height = "100vh";

watchId = navigator.geolocation.watchPosition(pos=>{
let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

let user = auth.currentUser;
if(!user) return;

db.ref("drivers/"+user.uid).set({
email:user.email,
lat:lat,
lng:lng,
status:"Activo"
});

});

}

function stopTracking(){
navigator.geolocation.clearWatch(watchId);

let user = auth.currentUser;
if(user){
db.ref("drivers/"+user.uid).update({status:"Offline"});
}
}

// ================= LOGOUT =================
function logout(){
auth.signOut().catch(()=>{});
location.reload();
}

// ================= ADMIN VIEW =================
db.ref("drivers").on("value",snap=>{
let data = snap.val() || {};

for(let id in data){
let d = data[id];

if(d.lat){
if(!markers[id]){
markers[id] = L.marker([d.lat,d.lng]).addTo(map)
.bindPopup(d.email);
}else{
markers[id].setLatLng([d.lat,d.lng]);
}
}
}
});

</script>

</body>
</html>
