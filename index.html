<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triciclos L&L</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

:root {
    --red: #E63946;
    --dark: #1D1D1D;
    --gray: #2B2B2B;
    --white: #fff;
}

body {
    background: linear-gradient(135deg, var(--dark), var(--gray));
    color: var(--white);
}

/* Splash */
.splash-screen {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity .4s ease;
}

.splash-screen.hidden {
    opacity: 0;
    visibility: hidden;
}

/* Header */
.header {
    position: relative;
    height: 180px;
    overflow: hidden;
}

.header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.user {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--red);
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* Container */
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

/* Buttons */
.btn {
    display: block;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
}

.btn-primary {
    background: var(--red);
    color: white;
}

.btn-secondary {
    background: white;
    color: black;
}

/* MAPA OSM */
#map {
    width: 100%;
    height: 250px;
    border-radius: 15px;
    margin: 15px 0;
    overflow: hidden;
    position: relative;
}

/* capa del mapa */
.map-layer {
    position: absolute;
    inset: 0;
    z-index: 1;
}

/* marcador */
.marker {
    position: absolute;
    width: 18px;
    height: 18px;
    background: var(--red);
    border-radius: 50%;
    border: 3px solid white;
    transform: translate(-50%, -50%);
    z-index: 2;
}

/* Modal */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: var(--gray);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
    * {
        animation: none !important;
        transition: none !important;
    }
}
</style>
</head>

<body>

<!-- Splash -->
<div class="splash-screen" id="splash">
    <h1 style="color:#E63946">Triciclos L&L</h1>
</div>

<!-- Header -->
<div class="header">
    <img src="https://raw.githubusercontent.com/Xiaomis3mods/triciclos/866c0c16996b49a44b72a8c5ea572725de54ca5d/file_00000000dd54722f815238144bf78d0a.png">
    <div class="user" onclick="openModal()">
        <i class="fa fa-user"></i>
    </div>
</div>

<div class="container">

<h2>¿A dónde vas hoy?</h2>

<!-- MAPA OSM -->
<div id="map">
    <div class="map-layer" id="mapLayer"></div>
    <div class="marker" id="marker"></div>
</div>

<a id="btnReserva" class="btn btn-primary">Reservar Viaje</a>
<a id="btnWhats" class="btn btn-secondary">Contactar por WhatsApp</a>

</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Perfil</h3>
        <p>Bienvenido a Triciclos L&L</p>
        <button onclick="closeModal()">Cerrar</button>
    </div>
</div>

<script>
const WHATSAPP = "5354632153";

/* SPLASH */
window.addEventListener("load", () => {
    document.getElementById("splash").classList.add("hidden");

    document.getElementById("btnWhats").href =
        "https://wa.me/" + WHATSAPP;

    document.getElementById("btnReserva").href =
        "https://xiaomis3mods.github.io/triciclos/";
});

/* MODAL */
function openModal() {
    document.getElementById("modal").classList.add("active");
}

function closeModal() {
    document.getElementById("modal").classList.remove("active");
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
});

/* ===== MAPA OPENSTREETMAP + GPS ===== */

const mapLayer = document.getElementById("mapLayer");
const marker = document.getElementById("marker");

/* cargar mapa base */
mapLayer.innerHTML = `
<iframe
width="100%"
height="100%"
style="border:0;"
src="https://www.openstreetmap.org/export/embed.html"
></iframe>
`;

/* GPS en tiempo real */
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // Convertir coordenadas a posición visual simple
            // (overlay visual sobre el iframe)
            const x = 50 + (lng % 0.01) * 50000;
            const y = 50 - (lat % 0.01) * 50000;

            marker.style.left = "50%";
            marker.style.top = "50%";

        },
        (err) => {
            console.log("GPS error", err);
            alert("Activa la ubicación para ver tu posición");
        },
        {
            enableHighAccuracy: true
        }
    );
}
</script>

</body>
</html>
