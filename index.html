<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Triciclos L&L</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        :root {
            --primary: #E63946;
            --bg: #F3F6FA;
            --card: #fff;
            --text: #1F2937;
            --border: #E5E7EB;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .map-area {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 14px;
            border-radius: 8px;
            border: 2px solid #D1D5DB;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background: #cc2b37;
        }

        .data-box {
            background: #F9FAFB;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .data-box strong {
            color: #111827;
        }

        .route-info {
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            color: #1E40AF;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            flex-direction: column;
            gap: 4px;
        }

        .status {
            font-weight: bold;
            margin-top: 5px;
            font-size: 14px;
        }

        .leaflet-routing-container {
            display: none !important;
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: 50%; }
            .map-area { height: 50%; }
        }
    </style>
</head>
<body>

    <header>🚖 Panel de Enrutamiento Automático - Triciclos L&L</header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Pegar Mensaje de Reserva</h3>
            <textarea id="textoReserva" placeholder="Pega aquí el texto completo enviado por el cliente..."></textarea>
            
            <button onclick="procesarMensaje()">Detectar y Trazar Ruta</button>

            <hr style="border: 0; border-top: 1px dashed var(--border);">

            <h3>Datos Detectados</h3>
            <div class="data-box">
                <p>👤 <strong>Cliente:</strong> <span id="det-nombre">-</span></p>
                <p>📞 <strong>Teléfono:</strong> <span id="det-tel">-</span></p>
                <p>📍 <strong>Recogida:</strong> <span id="det-origen">-</span></p>
                <p>🏁 <strong>Destino:</strong> <span id="det-destino">-</span></p>
            </div>

            <div id="routeInfoBox" class="route-info">
                <p>📏 <strong>Distancia:</strong> <span id="route-distancia">-</span></p>
                <p>⏱️ <strong>Tiempo Est.:</strong> <span id="route-tiempo">-</span></p>
            </div>

            <div id="statusLog" class="status" style="color: #6B7280;">Esperando mensaje...</div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map;
        let routingControl = null;

        const DEFAULT_LAT = 23.1136;
        const DEFAULT_LNG = -82.3666;

        // Definición de iconos personalizados (Usa SVG en formato DataURL para no depender de imágenes externas)
        const iconoRecogida = L.icon({
            iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23111827" width="36" height="36"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -32]
        });

        const iconoDestino = L.icon({
            iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23E63946" width="38" height="38"><path d="M19 4H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM5 12h7V6H5v6zm7 6h7v-6h-7v6z"/></svg>',
            iconSize: [38, 38],
            iconAnchor: [5, 38], // Anclado a la base inferior izquierda del mástil de la bandera
            popupAnchor: [12, -34]
        });

        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([DEFAULT_LAT, DEFAULT_LNG], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function procesarMensaje() {
            const texto = document.getElementById('textoReserva').value;
            const log = document.getElementById('statusLog');
            const infoBox = document.getElementById('routeInfoBox');
            
            infoBox.style.display = "none";

            if (!texto.trim()) {
                log.style.color = "red";
                log.innerText = "❌ El cuadro de texto está vacío.";
                return;
            }

            log.style.color = "#111827";
            log.innerText = "🔍 Analizando texto...";

            const regexNombre = /(?:👤\s*Nombre:\s*|Nombre:\s*)(.+)/i;
            const regexTel = /(?:📞\s*Teléfono:\s*|Teléfono:\s*|Celular:\s*)(.+)/i;
            const regexOrigen = /(?:📍\s*Recogida:\s*|Recogida:\s*|Origen:\s*)(.+)/i;
            const regexDestino = /(?:🏁\s*Destino:\s*|Destino:\s*)(.+)/i;

            const nombre = texto.match(regexNombre)?.[1]?.trim() || "No detectado";
            const tel = texto.match(regexTel)?.[1]?.trim() || "No detectado";
            const origen = texto.match(regexOrigen)?.[1]?.trim() || "";
            const destino = texto.match(regexDestino)?.[1]?.trim() || "";

            document.getElementById('det-nombre').innerText = nombre;
            document.getElementById('det-tel').innerText = tel;
            document.getElementById('det-origen').innerText = origen || "No detectado";
            document.getElementById('det-destino').innerText = destino || "No detectado";

            if (!origen || !destino) {
                log.style.color = "red";
                log.innerText = "❌ No se pudo extraer la recogida o el destino.";
                return;
            }

            log.style.color = "#111827";
            log.innerText = "🗺️ Geolocalizando recogida...";
            const coordOrigen = await buscarCoordenadas(origen);
            
            if (!coordOrigen) {
                log.style.color = "red";
                log.innerText = `❌ No se localizó la recogida ("${origen}")`;
                return;
            }

            await sleep(600);

            log.innerText = "🗺️ Geolocalizando destino...";
            const coordDestino = await buscarCoordenadas(destino);
            
            if (!coordDestino) {
                log.style.color = "red";
                log.innerText = `❌ No se localizó el destino ("${destino}")`;
                return;
            }

            log.style.color = "green";
            log.innerText = "⚡ Calculando mejor ruta...";

            trazarRuta(coordOrigen, coordDestino);
        }

        async function buscarCoordenadas(direccion) {
            let limpia = direccion
                .replace(/\s+e\/\s+/gi, ' e/ ')
                .replace(/\s+y\s+esq\.?\s+/gi, ' y ')
                .replace(/No\s*\.?\s*\d+/gi, '')
                .split('-')[0]
                .split(',')[0]
                .trim();

            let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(limpia + ", La Habana, Cuba")}&limit=1`;

            try {
                const res = await fetch(url, { 
                    headers: { 'User-Agent': 'TriciclosLyLPanelApp/3.0 (soporte@tricicloslyl.com)' } 
                });
                const data = await res.json();
                if (data && data.length > 0) {
                    return {
                        lat: parseFloat(data[0].lat),
                        lng: parseFloat(data[0].lon)
                    };
                }
                return null;
            } catch (error) {
                console.error("Error en geocoding:", error);
                return null;
            }
        }

        function trazarRuta(origenCoords, destinoCoords) {
            if (routingControl !== null) {
                map.removeControl(routingControl);
            }

            const p1 = L.latLng(origenCoords.lat, origenCoords.lng);
            const p2 = L.latLng(destinoCoords.lat, destinoCoords.lng);

            routingControl = L.Routing.control({
                waypoints: [p1, p2],
                routeWhileDragging: false,
                addWaypoints: false, 
                draggableWaypoints: false,
                fitSelectedRoutes: true,
                lineOptions: {
                    styles: [{ color: '#E63946', opacity: 0.8, weight: 6 }]
                },
                // AQUÍ SE ASIGNAN LOS NUEVOS CURSORES/ICONOS
                createMarker: function(i, waypoint, n) {
                    if (i === 0) {
                        return L.marker(waypoint.latLng, { icon: iconoRecogida })
                                .bindPopup('📍 <b>Punto de Recogida</b>');
                    } else {
                        return L.marker(waypoint.latLng, { icon: iconoDestino })
                                .bindPopup('🏁 <b>Destino Final</b>').openPopup();
                    }
                }
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                const distanciaKm = (summary.totalDistance / 1000).toFixed(2);
                const tiempoMin = Math.round(summary.totalTime / 60);

                document.getElementById('route-distancia').innerText = `${distanciaKm} km`;
                document.getElementById('route-tiempo').innerText = `${tiempoMin} min (Aprox.)`;
                document.getElementById('routeInfoBox').style.display = "flex";
                
                const log = document.getElementById('statusLog');
                log.style.color = "green";
                log.innerText = "✅ ¡Ruta trazada con éxito!";
            });

            routingControl.on('routingerror', function(e) {
                const log = document.getElementById('statusLog');
                log.style.color = "red";
                log.innerText = "❌ No se pudo trazar una ruta vial entre ambos puntos.";
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
