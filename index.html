<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triciclos L&L - Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
color:#111;
}

header{
height:220px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://raw.githubusercontent.com/Xiaomis3mods/triciclos/4dc2c8ca77aca786c4f1b0399244c3b0a28c3ebe/1b03d7c1a-32e1-471b-bf64-2aab6aa8124d.png");
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
flex-direction:column;
}

header h1{margin:0;font-size:36px;}
header p{margin-top:8px;font-size:16px;}

.container{max-width:900px;margin:auto;padding:15px;}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#c40000;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{background:#900;}

#map{height:260px;border-radius:10px;margin-top:10px;}

.badge{
padding:5px 8px;
border-radius:6px;
color:white;
font-size:11px;
}

.pendiente{background:orange;}
.aceptado{background:blue;}
.camino{background:green;}
.finalizado{background:black;}
</style>
</head>

<body>

<header>
<h1>Triciclos L&L</h1>
<p>Tu destino, nuestro compromiso</p>
</header>

<div class="container">

<!-- MAPA SOLO UBICACIÓN -->
<div class="card">
<h2>🗺️ Ubicación actual</h2>
<div id="map"></div>
</div>

<!-- RESERVA -->
<div class="card">
<h2>🛺 Reserva</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<input id="origenTxt" placeholder="Origen">
<input id="destinoTxt" placeholder="Destino (selecciona en mapa)">

<textarea id="detalle" placeholder="Detalles del viaje"></textarea>

<br>
<button onclick="reservar()">📲 Solicitar viaje</button>
</div>

<!-- HISTORIAL -->
<div class="card">
<h2>📋 Historial</h2>
<table width="100%">
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let viajes = JSON.parse(localStorage.getItem("viajes")||"[]");

// MAPA INICIAL
let map = L.map('map').setView([45.5019,-73.5674],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = null;

// SOLO UBICACIÓN ACTUAL
navigator.geolocation.getCurrentPosition(pos=>{
let user = [pos.coords.latitude,pos.coords.longitude];
map.setView(user,15);

// SOLO UN MARCADOR DE UBICACIÓN
marker = L.marker(user).addTo(map)
.bindPopup("Estás aquí").openPopup();

document.getElementById("origenTxt").value =
`${user[0].toFixed(5)}, ${user[1].toFixed(5)}`;
});

// DESTINO SOLO SE GUARDA EN FORMULARIO (NO MAPA)
map.on("click",e=>{
document.getElementById("destinoTxt").value =
`${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
});

// RESERVA
function reservar(){

let v={
n:document.getElementById("nombre").value,
t:document.getElementById("telefono").value,
o:document.getElementById("origenTxt").value,
d:document.getElementById("destinoTxt").value,
detalle:document.getElementById("detalle").value,
estado:"pendiente"
};

viajes.push(v);
localStorage.setItem("viajes",JSON.stringify(viajes));
render();

let msg =
`🛺 Triciclos L&L
👤 ${v.n}
📞 ${v.t}
📍 ${v.o} → ${v.d}
📝 ${v.detalle}`;

window.open("https://wa.me/5354632153?text="+encodeURIComponent(msg));
}

// HISTORIAL
function render(){
let tb=document.getElementById("tabla");
tb.innerHTML="";

viajes.forEach(v=>{
tb.innerHTML+=`
<tr>
<td>${v.n}</td>
<td>${v.o} → ${v.d}</td>
<td><span class="badge ${v.estado}">${v.estado}</span></td>
</tr>`;
});
}

render();

</script>

</body>
</html>
