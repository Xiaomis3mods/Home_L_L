<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Triciclos L&L</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

:root{
--r:#E63946;
--b:#111;
--w:#fff;
}

body{
background:var(--b);
color:var(--w);
}

/* HEADER */
header img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.slogan{
background:var(--r);
padding:14px;
text-align:center;
font-weight:bold;
}

/* CONTENEDOR */
.container{
max-width:750px;
margin:auto;
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:12px;
margin:15px 0;
}

/* 🔥 CAMPOS BLANCOS */
input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
background:#fff;
color:#000;
font-size:15px;
}

input::placeholder,
textarea::placeholder{
color:#666;
}

/* BOTONES */
button,.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:var(--r);
color:#fff;
font-weight:bold;
cursor:pointer;
}

.btn2{
background:#fff;
color:#000;
text-decoration:none;
display:block;
text-align:center;
margin-top:10px;
padding:14px;
border-radius:10px;
}

/* MAPA */
#map{
height:250px;
border-radius:12px;
overflow:hidden;
}

/* PERFIL */
.profile{
position:fixed;
top:15px;
right:15px;
background:var(--r);
width:45px;
height:45px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.profile a{color:#fff}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
align-items:center;
justify-content:center;
z-index:999;
}

.modalBox{
background:#222;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
text-align:center;
}
</style>
</head>

<body>

<!-- PERFIL -->
<div class="profile">
<a href="#" onclick="openModal()"><i class="fa fa-user"></i></a>
</div>

<!-- HEADER -->
<header>
<img src="https://raw.githubusercontent.com/Xiaomis3mods/triciclos/4f02d2a8803200f3c1ccd55b3b3745085c1f5c54/1b03d7c1a-32e1-471b-bf64-2aab6aa8124d.png">
</header>

<div class="slogan">Tu destino, nuestro compromiso</div>

<!-- CONTENIDO -->
<div class="container">

<!-- MAPA -->
<div class="card">
<h2>Tu ubicación</h2>
<div id="map">
<iframe id="mapframe" width="100%" height="100%" frameborder="0"
src="https://www.openstreetmap.org/export/embed.html"></iframe>
</div>
</div>

<!-- FORMULARIO -->
<div class="card">
<h2>Reserva tu viaje</h2>

<input id="nombre" placeholder="Nombre">
<input id="tel" placeholder="Teléfono">
<input id="origen" placeholder="Lugar de recogida">
<input id="destino" placeholder="Destino">

<select id="pas">
<option value="1">1 pasajero</option>
<option value="2">2 pasajeros</option>
<option value="3">3 pasajeros</option>
<option value="4">4 pasajeros</option>
<option value="5">5 pasajeros</option>
<option value="6" selected>6 pasajeros</option>
</select>

<select id="pago">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<textarea id="obs" placeholder="Observaciones"></textarea>

<button onclick="enviar()">Reservar por WhatsApp</button>

<a class="btn btn2" href="https://wa.me/5354632153" target="_blank">
<i class="fa-brands fa-whatsapp"></i> Contactar por WhatsApp
</a>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalBox">
<h2>Triciclos L&L</h2>
<p>Tu destino, nuestro compromiso</p><br>
<p>✔ Hasta 6 pasajeros</p>
<p>✔ Servicio rápido y seguro</p>
<br>
<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>

const modal=document.getElementById("modal");

function openModal(){
modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

window.onclick=e=>{
if(e.target===modal) closeModal();
};

// GEOLOCALIZACIÓN
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(p=>{
let lat=p.coords.latitude;
let lng=p.coords.longitude;

mapframe.src=
"https://www.openstreetmap.org/export/embed.html?bbox="+
(lng-0.005)+","+(lat-0.005)+","+(lng+0.005)+","+(lat+0.005)+
"&layer=mapnik&marker="+lat+","+lng;
});
}

// WHATSAPP
function enviar(){

if(!nombre.value || !tel.value || !origen.value || !destino.value){
alert("Completa todos los campos obligatorios");
return;
}

let mensaje=
"🚖 NUEVA RESERVA%0A%0A"+
"👤 Nombre: "+nombre.value+"%0A"+
"📞 Teléfono: "+tel.value+"%0A"+
"📍 Recogida: "+origen.value+"%0A"+
"🏁 Destino: "+destino.value+"%0A"+
"👥 Pasajeros: "+pas.value+"%0A"+
"💳 Pago: "+pago.value+"%0A"+
"📝 Observaciones: "+obs.value;

if(confirm("¿Confirmar y enviar reserva?")){
window.open("https://wa.me/5354632153?text="+mensaje,"_blank");
}
}

</script>

</body>
</html>
