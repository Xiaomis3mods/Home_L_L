<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Triciclos L&L</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
:root{--r:#E63946;--b:#111;--w:#fff}
body{background:var(--b);color:var(--w)}
header img{width:100%;height:210px;object-fit:cover;display:block}
.slogan{background:var(--r);padding:14px;text-align:center;font-weight:bold}
.container{max-width:700px;margin:auto;padding:15px}
.card{background:#1c1c1c;padding:15px;border-radius:12px;margin:15px 0}
input,select,textarea{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #555}
button,.btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--r);color:#fff;font-weight:bold;cursor:pointer}
.btn2{background:#fff;color:#000;text-decoration:none;display:block;text-align:center;margin-top:10px}
#map{height:250px;border-radius:12px;overflow:hidden}
.profile{position:fixed;top:15px;right:15px;background:var(--r);width:45px;height:45px;border-radius:50%;display:flex;justify-content:center;align-items:center}
.profile a{color:#fff}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
.modalBox{background:#222;padding:20px;border-radius:12px;width:90%;max-width:350px;text-align:center}
</style>
</head>
<body>
<div class="profile"><a href="#" onclick="openModal()"><i class="fa fa-user"></i></a></div>
<header>
<img src="https://raw.githubusercontent.com/Xiaomis3mods/triciclos/866c0c16996b49a44b72a8c5ea572725de54ca5d/file_00000000dd54722f815238144bf78d0a.png">
</header>
<div class="slogan">Tu destino, nuestro compromiso</div>
<div class="container">
<div class="card">
<h2>Tu ubicación</h2>
<div id="map">
<iframe id="mapframe" width="100%" height="100%" frameborder="0"
src="https://www.openstreetmap.org/export/embed.html"></iframe>
</div>
</div>

<div class="card">
<h2>Reserva tu viaje</h2>
<input id="nombre" placeholder="Nombre">
<input id="tel" placeholder="Teléfono">
<input id="origen" placeholder="Lugar de recogida">
<input id="destino" placeholder="Destino">
<select id="pas">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option selected>6</option>
</select>
<select id="pago">
<option>Efectivo</option>
<option>Transferencia</option>
</select>
<textarea id="obs" placeholder="Observaciones"></textarea>
<button onclick="enviar()">Reservar por WhatsApp</button>
<a class="btn btn2" href="https://wa.me/5354632153" target="_blank">Contactar por WhatsApp</a>
</div>
</div>

<div class="modal" id="modal">
<div class="modalBox">
<h2>Triciclos L&L</h2>
<p>Tu destino, nuestro compromiso</p><br>
<p>Hasta 6 pasajeros.</p>
<p>Servicio rápido y seguro.</p><br>
<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
function openModal(){modal.style.display="flex";}
function closeModal(){modal.style.display="none";}
window.onclick=e=>{if(e.target==modal)closeModal();}

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(p){
let lat=p.coords.latitude,lng=p.coords.longitude;
mapframe.src="https://www.openstreetmap.org/export/embed.html?bbox="+(lng-0.005)+","+(lat-0.005)+","+(lng+0.005)+","+(lat+0.005)+"&layer=mapnik&marker="+lat+","+lng;
});
}

function enviar(){
let t="Hola, deseo reservar un viaje.%0A%0A"+
"Nombre: "+nombre.value+"%0A"+
"Teléfono: "+tel.value+"%0A"+
"Recogida: "+origen.value+"%0A"+
"Destino: "+destino.value+"%0A"+
"Pasajeros: "+pas.value+"%0A"+
"Pago: "+pago.value+"%0A"+
"Observaciones: "+obs.value;
window.open("https://wa.me/5354632153?text="+t,"_blank");
}
</script>
</body>
</html>
