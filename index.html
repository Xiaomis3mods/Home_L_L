<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triciclos L&L - Uber App</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
color:#111;
}

/* HEADER */
header{
height:220px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://raw.githubusercontent.com/Xiaomis3mods/triciclos/4dc2c8ca77aca786c4f1b0399244c3b0a28c3ebe/1b03d7c1a-32e1-471b-bf64-2aab6aa8124d.png");
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
flex-direction:column;
}

header h1{margin:0;font-size:34px;}
header p{margin-top:8px;font-size:16px;}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#c40000;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{background:#900;}

.servicios{
display:flex;
gap:10px;
}

.tipo{
flex:1;
padding:10px;
border:2px solid #ddd;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.tipo.activo{
border-color:#c40000;
background:#ffe5e5;
}

#map{
height:250px;
border-radius:10px;
margin-top:10px;
}

table{
width:100%;
font-size:13px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:5px;
text-align:center;
}

.badge{
padding:5px 8px;
border-radius:6px;
color:white;
font-size:11px;
}

.pendiente{background:orange;}
.aceptado{background:blue;}
.camino{background:green;}
.finalizado{background:black;}

.admin{
background:#111;
color:white;
padding:8px;
margin:5px 0;
border-radius:8px;
font-size:13px;
}

</style>
</head>

<body>

<header>
<h1>Triciclos L&L</h1>
<p>Tu destino, nuestro compromiso</p>
</header>

<div class="container">

<!-- MAPA -->
<div class="card">
<h2>🗺️ Mapa</h2>
<div id="map"></div>
<p>Origen: <span id="ori">Detectando...</span></p>
<p>Destino: <span id="des">Toca el mapa</span></p>
<p>Distancia: <span id="dist">--</span></p>
</div>

<!-- RESERVA -->
<div class="card">
<h2>🛺 Reserva</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="origenTxt" placeholder="Origen manual">
<input id="destinoTxt" placeholder="Destino manual">
<textarea id="detalle" placeholder="Detalles"></textarea>

<div class="servicios">
<div class="tipo activo" onclick="tipo='eco';select(this)">Económico</div>
<div class="tipo" onclick="tipo='vip';select(this)">Ejecutivo</div>
</div>

<br>

<button onclick="reservar()">📲 Solicitar viaje</button>
</div>

<!-- HISTORIAL -->
<div class="card">
<h2>📋 Historial</h2>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Ruta</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- CONDUCTORES -->
<div class="card">
<h2>👨‍✈️ Conductores</h2>

<div class="admin">Juan - Libre</div>
<div class="admin">Pedro - En ruta</div>
<div class="admin">Carlos - Libre</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let tipo="eco";
let viajes = JSON.parse(localStorage.getItem("viajes")||"[]");

let map = L.map('map').setView([40.7128,-74.0060],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let origen=null;
let destino=null;
let m1,m2;

navigator.geolocation.getCurrentPosition(pos=>{
origen=[pos.coords.latitude,pos.coords.longitude];
map.setView(origen,15);
m1=L.marker(origen).addTo(map).bindPopup("Origen");
document.getElementById("ori").innerText=origen;
});

map.on("click",e=>{
destino=[e.latlng.lat,e.latlng.lng];
if(m2) map.removeLayer(m2);
m2=L.marker(destino).addTo(map).bindPopup("Destino");
document.getElementById("des").innerText=destino;
calcular();
});

function calcular(){
if(!origen||!destino)return;
let d=map.distance(origen,destino)/1000;
document.getElementById("dist").innerText=d.toFixed(2)+" km";
}

function reservar(){

let v={
n:nombre.value,
t:telefono.value,
o:origenTxt.value||origen,
d:destinoTxt.value||destino,
detalle:detalle.value,
estado:"pendiente",
tipo:tipo
};

viajes.push(v);
localStorage.setItem("viajes",JSON.stringify(viajes));
render();

let msg=`🛺 Triciclos L&L
${v.n}
${v.o} → ${v.d}
Tipo:${v.tipo}`;

window.open("https://wa.me/5354632153?text="+encodeURIComponent(msg));

}

function cambiar(i){

let estados=["pendiente","aceptado","camino","finalizado"];

let actual=estados.indexOf(viajes[i].estado);
viajes[i].estado=estados[(actual+1)%4];

localStorage.setItem("viajes",JSON.stringify(viajes));
render();

}

function render(){

let tb=document.getElementById("tabla");
tb.innerHTML="";

viajes.forEach((v,i)=>{

tb.innerHTML+=`
<tr>
<td>${v.n}</td>
<td>${v.o} → ${v.d}</td>
<td><span class="badge ${v.estado}">${v.estado}</span></td>
<td><button onclick="cambiar(${i})">Cambiar</button></td>
</tr>
`;

});

}

function select(el){
document.querySelectorAll(".tipo").forEach(e=>e.classList.remove("activo"));
el.classList.add("activo");
}

render();

</script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
