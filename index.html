<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Triciclos L&L</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        :root {
            --primary: #E63946;
            --bg: #F3F6FA;
            --card: #fff;
            --text: #1F2937;
            --border: #E5E7EB;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .map-area {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #D1D5DB;
            font-size: 14px;
            resize: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background: #cc2b37;
        }

        .data-box {
            background: #F9FAFB;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .data-box strong {
            color: #111827;
        }

        .status {
            font-weight: bold;
            margin-top: 5px;
            font-size: 14px;
        }

        /* Oculta la caja de texto con itinerarios de Leaflet Routing Machine */
        .leaflet-routing-container {
            display: none !important;
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: 45%; }
            .map-area { height: 55%; }
        }
    </style>
</head>
<body>

    <header>🚖 Panel de Enrutamiento Automático - Triciclos L&L</header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Pegar Mensaje de Reserva</h3>
            <textarea id="textoReserva" placeholder="Pega aquí el texto completo enviado por el cliente..."></textarea>
            
            <button onclick="procesarMensaje()">Detectar y Trazar Ruta</button>

            <hr style="border: 0; border-top: 1px dashed var(--border);">

            <h3>Datos Detectados</h3>
            <div class="data-box">
                <p>👤 <strong>Cliente:</strong> <span id="det-nombre">-</span></p>
                <p>📞 <strong>Teléfono:</strong> <span id="det-tel">-</span></p>
                <p>📍 <strong>Recogida:</strong> <span id="det-origen">-</span></p>
                <p>🏁 <strong>Destino:</strong> <span id="det-destino">-</span></p>
            </div>

            <div id="statusLog" class="status" style="color: #6B7280;">Esperando mensaje...</div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map;
        let routingControl = null;

        const DEFAULT_LAT = 23.1136;
        const DEFAULT_LNG = -82.3666;

        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([DEFAULT_LAT, DEFAULT_LNG], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        async function procesarMensaje() {
            const texto = document.getElementById('textoReserva').value;
            const log = document.getElementById('statusLog');
            
            if (!texto.trim()) {
                log.style.color = "red";
                log.innerText = "❌ El cuadro de texto está vacío.";
                return;
            }

            log.style.color = "#111827";
            log.innerText = "🔍 Analizando texto...";

            const regexNombre = /(?:👤\s*Nombre:\s*|Nombre:\s*)(.+)/i;
            const regexTel = /(?:📞\s*Teléfono:\s*|Teléfono:\s*)(.+)/i;
            const regexOrigen = /(?:📍\s*Recogida:\s*|Recogida:\s*)(.+)/i;
            const regexDestino = /(?:🏁\s*Destino:\s*|Destino:\s*)(.+)/i;

            const nombre = texto.match(regexNombre)?.[1]?.trim() || "No detectado";
            const tel = texto.match(regexTel)?.[1]?.trim() || "No detectado";
            const origen = texto.match(regexOrigen)?.[1]?.trim() || "";
            const destino = texto.match(regexDestino)?.[1]?.trim() || "";

            document.getElementById('det-nombre').innerText = nombre;
            document.getElementById('det-tel').innerText = tel;
            document.getElementById('det-origen').innerText = origen || "No detectado";
            document.getElementById('det-destino').innerText = destino || "No detectado";

            if (!origen || !destino) {
                log.style.color = "red";
                log.innerText = "❌ No se pudo extraer la recogida o el destino.";
                return;
            }

            log.style.color = "#111827";
            log.innerText = "🗺️ Geolocalizando origen...";
            const coordOrigen = await buscarCoordenadas(origen);
            
            if (!coordOrigen) {
                log.style.color = "red";
                log.innerText = "❌ No se localizó la recogida en el mapa.";
                return;
            }

            log.innerText = "🗺️ Geolocalizando destino...";
            const coordDestino = await buscarCoordenadas(destino);
            
            if (!coordDestino) {
                log.style.color = "red";
                log.innerText = "❌ No se localizó el destino en el mapa.";
                return;
            }

            log.style.color = "green";
            log.innerText = "✅ ¡Ruta trazada con éxito!";

            trazarRuta(coordOrigen, coordDestino);
        }

        async function buscarCoordenadas(direccion) {
            // Refinamiento para procesamiento de direcciones cubanas
            // Eliminamos "e/" y lo cambiamos por espacio para que Nominatim entienda intersecciones estándar
            let limpia = direccion
                .replace(/\s+e\/\s+/gi, ' ')
                .replace(/\s+y\s+esq\.?\s+/gi, ' y ')
                .split(',')[0]; // Nos quedamos con la primera parte de la cadena antes de metadatos del barrio

            let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(limpia + ", La Habana, Cuba")}&limit=1`;

            try {
                const res = await fetch(url, { headers: { 'User-Agent': 'TriciclosLyLPanel/1.0' } });
                const data = await res.json();
                if (data && data.length > 0) {
                    return L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                }
                return null;
            } catch (error) {
                console.error("Error en geocoding:", error);
                return null;
            }
        }

        function trazarRuta(origenLngLat, destinoLngLat) {
            if (routingControl !== null) {
                map.removeControl(routingControl);
            }

            routingControl = L.Routing.control({
                waypoints: [origenLngLat, destinoLngLat],
                routeWhileDragging: false,
                addWaypoints: false, 
                draggableWaypoints: false,
                fitSelectedRoutes: true, // Autoajusta el zoom del mapa para ver el viaje completo
                lineOptions: {
                    styles: [{ color: '#E63946', opacity: 0.8, weight: 6 }]
                },
                createMarker: function(i, waypoint, n) {
                    const marcadorHtml = i === 0 ? '📍 Punto de Recogida' : '🏁 Destino Final';
                    return L.marker(waypoint.latLng).bindPopup(marcadorHtml).openPopup();
                }
            }).addTo(map);
        }

        window.onload = initMap;
    </script>
</body>
</html>
